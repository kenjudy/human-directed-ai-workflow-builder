name: Release ai-workflow-builder

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build skill package
        run: bash claude-skill/build-scaffold.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: claude-skill/ai-workflow-builder.skill
          generate_release_notes: false
          body: |
            ## Install

            **Claude.ai:** Go to **Customize** → **Skills** → **Add Skill** → upload `ai-workflow-builder.skill`.

            **Claude Code (local install):**
            ```bash
            unzip -o ai-workflow-builder.skill -d ~/.claude/skills/
            ```

            See the [README](https://github.com/kenjudy/ai-workflow-builder/blob/main/README.md) for full documentation.
